# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: none — greenfield static site (first project: ancora-web, corporate institutional)
  Architecture: TBD at sdd-design time
  Testing: no test runner; visual/a11y checks via seo-audit + web-design-guidelines + accessibility skills
  Style: corporate institutional site for rental real-estate asset management firm (Bolivia)

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
